<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>体重挑战</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="static/app.css">
</head>
<body>
  <div id="app">
    <!-- 页面容器 -->
    <div id="page-container">
      <div style="padding: 50px; text-align: center; color: #999;">
        <div style="font-size: 24px; margin-bottom: 20px;">⏳ 加载中...</div>
        <div style="font-size: 14px;">如果长时间未显示，请刷新页面</div>
      </div>
    </div>
  </div>

  <script src="utils/storage.js"></script>
  <script src="utils/calculator.js"></script>
  <script src="app.js"></script>

  <!-- Test Script -->
  <script>
    console.log('Page loaded');
    window.addEventListener('DOMContentLoaded', function() {
      console.log('DOMContentLoaded fired');
      console.log('Storage exists:', typeof Storage !== 'undefined');
      console.log('Calculator exists:', typeof Calculator !== 'undefined');
      console.log('App exists:', typeof App !== 'undefined');

      // 显示测试信息
      var testDiv = document.createElement('div');
      testDiv.style.cssText = 'position:fixed;bottom:10px;left:10px;background:#333;color:#fff;padding:10px;font-size:12px;z-index:9999;border-radius:4px;';
      // 使用 textContent 避免 XSS
      testDiv.textContent = 'JS Loaded: Storage=' + (typeof Storage !== 'undefined') + ', App=' + (typeof App !== 'undefined');
      document.body.appendChild(testDiv);
    });
  </script>

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js').catch(err => {
        console.log('SW registration failed:', err);
      });
    }
  </script>
</body>
</html>
